<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <link rel="stylesheet" href="./styles/style.css" />
        <link
            rel="icon"
            type="image/png"
            sizes="32x32"
            href="./images/favicon-32x32.png"
        />
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=Figtree:ital,wght@0,300..900;1,300..900&family=Fraunces:ital,opsz,wght@0,9..144,100..900;1,9..144,100..900&family=Hanken+Grotesk:ital,wght@0,100..900;1,100..900&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Montserrat:ital,wght@0,100..900;1,100..900&family=Outfit:wght@100..900&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
            rel="stylesheet"
        />
        <title>Frontend Mentor | NFT preview card component</title>
    </head>
    <body>
        <div class="card">
            <img
                class="main-image"
                src="./images/image-equilibrium.jpg"
                alt="equilibrium"
            />
            <div class="tag">Equilibrium #3429</div>
            <div class="desc">
                Our Equilibrium collection promotes balance and calm.
            </div>
            <div class="info">
                <span class="info-container price">
                    <img src="./images/icon-ethereum.svg" alt="etherium" />0.041
                    ETH</span
                >
                <span class="info-container time-left">
                    <img src="./images/icon-clock.svg" alt="time-icon" />3 days
                    left</span
                >
            </div>
            <div class="line"></div>
            <div class="author">
                <img src="./images/image-avatar.png" alt="Jules Wyvern" />
                <div class="author-desc">
                    Creation of <span class="author-name">Jules Wyvern</span>
                </div>
            </div>
        </div>
        <footer class="attribution">
            Challenge by
            <a
                href="https://www.frontendmentor.io?ref=challenge"
                target="_blank"
                rel="noopener noreferrer"
                >Frontend Mentor</a
            >. Coded by
            <a
                href="https://github.com/ShamardinaEM"
                target="_blank"
                rel="noopener noreferrer"
                >ShamardinaEM</a
            >.
        </footer>
    </body>
</html>
